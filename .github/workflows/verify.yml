name: Verify N.E.K.O Plugin

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  PLUGIN_ID: neko_warthunder
  NEKO_REPOSITORY: CN-Zephyr/N.E.K.O
  NEKO_REF: main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout plugin repository
        uses: actions/checkout@v4
        with:
          path: plugin-repo

      - name: Checkout N.E.K.O
        uses: actions/checkout@v4
        with:
          repository: ${{ env.NEKO_REPOSITORY }}
          ref: ${{ env.NEKO_REF }}
          path: neko

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run standalone logic tests
        working-directory: plugin-repo
        run: |
          uv run python tests/run_logic_tests.py
          uv run python -m pytest tests -q

      - name: Mount plugin into N.E.K.O tree
        run: |
          rm -rf "neko/plugin/plugins/${PLUGIN_ID}"
          mkdir -p neko/plugin/plugins
          cp -R plugin-repo "neko/plugin/plugins/${PLUGIN_ID}"

      - name: Plugin check
        working-directory: neko
        run: |
          uv run python -m plugin.neko_plugin_cli.cli check "plugin/plugins/${PLUGIN_ID}"

      - name: Write verification summary
        working-directory: plugin-repo
        run: |
          {
            echo "## neko_warthunder verification"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Plugin ID | ${PLUGIN_ID} |"
            echo "| Plugin commit | ${GITHUB_SHA} |"
            echo "| N.E.K.O repository | ${NEKO_REPOSITORY} |"
            echo "| N.E.K.O ref | ${NEKO_REF} |"
            echo ""
            echo "### Checks"
            echo "- logic self-check"
            echo "- pytest"
            echo "- plugin check"
          } >> "$GITHUB_STEP_SUMMARY"
